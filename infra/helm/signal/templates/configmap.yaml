apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "signal.fullname" . }}
  labels:
    {{- include "signal.labels" . | nindent 4 }}
data:
  ALPACA_BASE_URL: {{ .Values.alpaca.baseUrl | quote }}
  ALPACA_DATA_FEED: {{ .Values.alpaca.dataFeed | quote }}
  ALPACA_PAPER: "true"
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
