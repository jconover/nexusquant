{{/*
Two secrets: Alpaca credentials and Postgres password. Each is created by
the chart only when the corresponding .createSecret flag is true (dev
convenience). In production, sealed-secrets (or similar) reconciles
Secrets with the same names out-of-band.
*/}}
{{- if .Values.alpaca.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signal.alpacaSecretName" . }}
  labels:
    {{- include "signal.labels" . | nindent 4 }}
type: Opaque
stringData:
  ALPACA_API_KEY_ID: {{ required "alpaca.apiKeyId is required when alpaca.createSecret=true" .Values.alpaca.apiKeyId | quote }}
  ALPACA_API_SECRET_KEY: {{ required "alpaca.apiSecretKey is required when alpaca.createSecret=true" .Values.alpaca.apiSecretKey | quote }}
{{- end }}
{{- if .Values.postgres.createSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "signal.postgresSecretName" . }}
  labels:
    {{- include "signal.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "postgres.password is required when postgres.createSecret=true" .Values.postgres.password | quote }}
{{- end }}
