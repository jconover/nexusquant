name: nexusquant

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    env_file: ../.env
    ports: ["5432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: ../.env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  signal:
    build: ../services/signal
    ports: ["8001:8001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  risk:
    build: ../services/risk
    ports: ["8002:8002"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  executor:
    build: ../services/executor
    ports: ["8003:8003"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  watchlist:
    build: ../services/watchlist
    ports: ["8004:8004"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  ingester:
    build: ../services/ingester
    ports: ["8005:8005"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  mcp:
    build: ../services/mcp
    ports: ["8006:8006"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  slack:
    build: ../services/slack
    ports: ["8007:8007"]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

volumes:
  postgres_data:
  redis_data:
  minio_data:
