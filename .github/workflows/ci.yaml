name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  service:
    name: service (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [signal, risk, executor, watchlist, ingester, mcp, slack]
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Ruff lint
        run: uv run --with ruff ruff check services/${{ matrix.service }}

      - name: Ruff format check
        run: uv run --with ruff ruff format --check services/${{ matrix.service }}

      - name: Mypy
        run: uv run --with mypy mypy services/${{ matrix.service }}/src

      - name: Pytest
        run: uv run pytest services/${{ matrix.service }}/tests -q

      - name: Docker build
        run: docker build services/${{ matrix.service }}

  schemas:
    name: schemas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Validate JSON schema examples
        run: uv run pytest tests/unit/test_schemas.py -q

  paper-only-guard:
    name: paper-only guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject paper=False in Python sources
        run: |
          set -e
          matches=$(grep -rn --include='*.py' \
               --exclude-dir='.venv' --exclude-dir='.git' \
               --exclude-dir='.mypy_cache' --exclude-dir='.pytest_cache' \
               --exclude-dir='.ruff_cache' \
               -E 'paper[[:space:]]*=[[:space:]]*False' . \
               | grep -v 'paper-check: allow' || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found paper=False in Python source. This codebase is paper-only."
            echo "::error::If the match is an intentional rejection in validator/test code, annotate the line with '# paper-check: allow'."
            exit 1
          fi

      - name: Reject live Alpaca URL in Python sources
        run: |
          set -e
          matches=$(grep -rn --include='*.py' \
               --exclude-dir='.venv' --exclude-dir='.git' \
               --exclude-dir='.mypy_cache' --exclude-dir='.pytest_cache' \
               --exclude-dir='.ruff_cache' \
               -E 'https://api\.alpaca\.markets' . \
               | grep -v 'paper-check: allow' || true)
          if [ -n "$matches" ]; then
            echo "$matches"
            echo "::error::Found live Alpaca URL in Python source. Use the paper URL."
            echo "::error::If the match is an intentional rejection in validator/test code, annotate the line with '# paper-check: allow'."
            exit 1
          fi

  helm-lint:
    name: helm lint (signal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: helm lint (default values)
        run: helm lint infra/helm/signal

      - name: helm lint (values-dev)
        run: helm lint infra/helm/signal -f infra/helm/signal/values-dev.yaml

      - name: helm template (default values)
        run: helm template ci infra/helm/signal > /dev/null

      - name: helm template (values-dev)
        run: helm template ci infra/helm/signal -f infra/helm/signal/values-dev.yaml > /dev/null

  image-signal-push:
    name: build + push signal image
    runs-on: ubuntu-latest
    needs: [service, paper-only-guard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/nexusquant-signal
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/signal-v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/signal
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
